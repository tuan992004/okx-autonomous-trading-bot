version: "3.8"

services:
  okx-bot:
    build: .
    container_name: okx-trading-bot
    restart: unless-stopped
    env_file: .env
    environment:
      - NODE_ENV=production
      - LIVE_TRADING=${LIVE_TRADING:-false}
      - LOG_LEVEL=${LOG_LEVEL:-info}
      - OKX_PROFILE=${OKX_PROFILE:-demo}
    volumes:
      # Persist SQLite database
      - bot-data:/app/data
      # Persist logs
      - bot-logs:/app/logs
      # Mount OKX config (read-only) — use /home/node since container runs as non-root
      - ${HOME}/.okx:/home/node/.okx:ro
      # Mount custom strategy/risk config (optional)
      - ./config:/app/config:ro
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('https://www.okx.com/api/v5/public/time').then(r => r.ok ? process.exit(0) : process.exit(1)).catch(() => process.exit(1))"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "0.5"
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  bot-data:
  bot-logs:
