[instruments]
spot = ["BTC-USDT", "ETH-USDT", "SOL-USDT"]
swap = ["BTC-USDT-SWAP", "ETH-USDT-SWAP"]

[signals]
momentum_threshold_pct = 1.5       # % move to trigger signal (lowered from 2.0)
rsi_oversold = 25                  # RSI threshold (widened from 30 for crypto)
rsi_overbought = 75                # RSI threshold (widened from 70 for crypto)
rsi_period = 9                     # RSI period (shortened from 14 for 5m scalping)
volume_spike_multiplier = 2.0      # x rolling average (lowered from 2.5)
funding_rate_extreme = 0.0008      # absolute funding rate threshold (more sensitive)
orderbook_imbalance_ratio = 2.5    # bid/ask volume ratio threshold (lowered from 3.0)
ema_fast_period = 9                # fast EMA for crossover signal
ema_slow_period = 21               # slow EMA for crossover signal
trend_ema_period = 50              # 1H trend EMA for multi-timeframe filter
min_confidence_threshold = 0.6     # minimum confidence to forward to decision maker

[execution]
default_order_type = "limit"
limit_offset_bps = 10              # price offset from mid in basis points (doubled from 5)
max_slippage_bps = 20
scan_interval_seconds = 20         # faster scanning (was 30)

[models]
scanner = "claude-haiku-4-5-20251001"
decision = "claude-sonnet-4-6-20250514"
validator = "claude-haiku-4-5-20251001"
use_opus_for_complex = false       # flag-gated
